worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Optional API rate limiting at edge (backend already has limiter)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    # WebSocket upgrade support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream frontend_upstream {
        server frontend:5173;
    }

    upstream backend_upstream {
        server backend:3001;
    }

    upstream titiler_upstream {
        server titiler:8000;
    }

    # First deployment mode: HTTP only (works before SSL setup)
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        client_max_body_size 100m;

        # If SSL is configured later, you can enable redirect with:
        # return 301 https://$host$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # API proxies (60s)
        location /api/rain/ {
            proxy_pass http://140.113.16.140/rain/;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://backend_upstream/api/;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location = /api-docs {
            proxy_pass http://backend_upstream/api-docs/;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /api-docs/ {
            proxy_pass http://backend_upstream/api-docs/;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # File/static proxies (300s)
        location /uploads/ {
            proxy_pass http://backend_upstream/uploads/;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        location /data/ {
            proxy_pass http://backend_upstream/data/;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        location /titiler/ {
            proxy_pass http://titiler_upstream/;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location / {
            proxy_pass http://frontend_upstream/;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        error_page 404 /404.html;
        location = /404.html {
            internal;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
        }
    }

    # SSL mode scaffold (enable after certificates are provisioned)
    # server {
    #     listen 443 ssl;
    #     listen [::]:443 ssl;
    #     server_name your-domain.example;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    #     client_max_body_size 100m;
    #
    #     # Mirror the same location blocks as HTTP server above,
    #     # or redirect HTTP to HTTPS from the port 80 server.
    # }
}
