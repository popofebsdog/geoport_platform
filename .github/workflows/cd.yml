name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: cd-main-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Optional: require GitHub Environment approval before deploy.
    # environment:
    #   name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Required secrets:
      # - EC2_HOST: EC2 public IP / hostname
      # - EC2_USER: SSH username (e.g. ec2-user or ubuntu)
      # - EC2_SSH_KEY: SSH private key content
      # - DEPLOY_PATH: Path on EC2 (defaults to /opt/geoport_platform if empty)
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then DEPLOY_PATH="/opt/geoport_platform"; fi

            cd "$DEPLOY_PATH"
            git pull origin main

            # Ensure all upload directories exist on host (bind-mounted into backend container)
            # Uses sudo because Docker may have created backend/uploads as root
            sudo mkdir -p backend/uploads/projects backend/uploads/reports backend/uploads/data \
              backend/uploads/warning-regions backend/uploads/temporal backend/uploads/features \
              backend/uploads/data/disaster-points backend/uploads/data/geojson backend/uploads/data/kml \
              backend/uploads/data/basemaps backend/uploads/data/others backend/uploads/data/snapshots/geojson
            # Backend runs as USER node (uid 1000) inside container; match ownership on host
            sudo chown -R 1000:1000 backend/uploads

            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --force-recreate

            # Wait for postgres to accept connections before running migrations
            for i in $(seq 1 10); do
              if docker compose exec -T postgres pg_isready -U geoport_user -d geoport > /dev/null 2>&1; then
                echo "Postgres ready on attempt $i"
                break
              fi
              echo "Waiting for postgres... attempt $i/10"
              sleep 3
            done

            # Run SQL migrations in order (idempotent via IF NOT EXISTS)
            for f in $(ls backend/database/migrations/*.sql | sort); do
              echo "Running migration: $(basename $f)"
              docker compose exec -T postgres psql -U geoport_user -d geoport < "$f" > /dev/null 2>&1 || true
            done

            # Wait for backend to be ready (up to 60s)
            for i in $(seq 1 12); do
              if curl -sf http://localhost/api/health > /dev/null 2>&1; then
                echo "Health check passed on attempt $i"
                exit 0
              fi
              echo "Waiting for backend... attempt $i/12"
              sleep 5
            done
            echo "Health check failed after 60s"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=50
            exit 1

            # Rollback hint (manual):
            # git reset --hard <previous-known-good-commit>
            # docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

      - name: Deployment failed annotation
        if: failure()
        run: |
          echo "::error title=Deployment failed::EC2 deployment failed. Check SSH logs, docker compose output, and health check."

      # Deployment status badge (replace OWNER/REPO):
      # ![CD](https://github.com/OWNER/REPO/actions/workflows/cd.yml/badge.svg)
